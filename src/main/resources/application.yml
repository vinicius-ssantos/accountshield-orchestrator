spring:
  application:
    name: accountshield-orchestrator
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/accountshield}
    username: ${DATABASE_USERNAME:accountshield}
    password: ${DATABASE_PASSWORD:accountshield-local-only}
    hikari:
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:10}
      minimum-idle: ${DATABASE_MIN_IDLE:1}
      connection-timeout: 5000
      validation-timeout: 3000
  flyway:
    enabled: true
    validate-migration-naming: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

accountshield:
  protection:
    rate-limit:
      max-requests: 10
      window: 60s
