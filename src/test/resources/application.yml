spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///accountshield
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    validate-migration-naming: true
