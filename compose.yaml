services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accountshield}
      POSTGRES_USER: ${POSTGRES_USER:-accountshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accountshield-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - accountshield-postgres:/var/lib/postgresql/data

volumes:
  accountshield-postgres:
