services:
  postgres:
    image: postgres:17-alpine
    container_name: accountshield-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accountshield}
      POSTGRES_USER: ${POSTGRES_USER:-accountshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accountshield-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - accountshield-postgres:/var/lib/postgresql/data

  app:
    build: .
    container_name: accountshield-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-accountshield}
      DATABASE_USERNAME: ${POSTGRES_USER:-accountshield}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-accountshield-local-only}
    ports:
      - "${APP_PORT:-8080}:8080"

  prometheus:
    image: prom/prometheus:latest
    container_name: accountshield-prometheus
    depends_on:
      - app
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: accountshield-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/accountshield-dashboard.json:/var/lib/grafana/dashboards/accountshield-dashboard.json:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

volumes:
  accountshield-postgres:
