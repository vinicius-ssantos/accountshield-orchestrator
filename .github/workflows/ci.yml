name: CI

on:
  push:
    branches: [main, integration/frontend-console]
  pull_request:
    branches: [main, integration/frontend-console]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Maven verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Summarize test failure causes
        if: failure()
        shell: bash
        run: |
          if compgen -G "target/surefire-reports/*.txt" > /dev/null; then
            grep -h -E "^(Caused by:|[[:space:]]*Caused by:|\[ERROR\]|org\.flywaydb|jakarta\.persistence|org\.springframework\.beans)" \
              target/surefire-reports/*.txt | head -n 250 || true
          fi

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          retention-days: 7

  frontend:
    name: Frontend verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ACCOUNTSHIELD_DATA_SOURCE: fixtures
      NEXT_PUBLIC_APP_ENV: ci

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install declared npm version
        run: npm install --global npm@11.4.2 --no-audit --no-fund

      - name: Validate lockfile metadata and sources
        run: |
          node <<'NODE'
          const lock = require("./package-lock.json");
          if (lock.lockfileVersion !== 3) {
            throw new Error(`Expected lockfileVersion 3, found ${lock.lockfileVersion}`);
          }
          if (lock.packages?.[""]?.name !== "accountshield-console") {
            throw new Error("Unexpected root package in package-lock.json");
          }
          const invalidSources = Object.entries(lock.packages ?? {})
            .filter(([, metadata]) => metadata?.resolved)
            .filter(([, metadata]) => !metadata.resolved.startsWith("https://registry.npmjs.org/"))
            .map(([name, metadata]) => `${name}: ${metadata.resolved}`);
          if (invalidSources.length > 0) {
            throw new Error(`Unexpected package sources:\n${invalidSources.join("\n")}`);
          }
          NODE

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Next.js types
        run: npm run typegen

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and component tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-test-reports
          path: |
            frontend/coverage/**
            frontend/test-results/vitest-junit.xml
          if-no-files-found: ignore
          retention-days: 7

  frontend-e2e:
    name: Frontend browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: frontend
    env:
      ACCOUNTSHIELD_DATA_SOURCE: fixtures
      NEXT_PUBLIC_APP_ENV: test

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install declared npm version
        run: npm install --global npm@11.4.2 --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production frontend
        run: npm run build

      - name: Run Playwright and accessibility tests
        run: npm run test:e2e

      - name: Upload browser test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-browser-test-artifacts
          path: |
            frontend/playwright-report/**
            frontend/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [verify, frontend]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
