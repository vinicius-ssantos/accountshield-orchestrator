name: CI

on:
  push:
    branches: [main, integration/frontend-console, feat/issue-63-frontend-lockfile]
  pull_request:
    branches: [main, integration/frontend-console]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Maven verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Summarize test failure causes
        if: failure()
        shell: bash
        run: |
          if compgen -G "target/surefire-reports/*.txt" > /dev/null; then
            grep -h -E "^(Caused by:|[[:space:]]*Caused by:|\[ERROR\]|org\.flywaydb|jakarta\.persistence|org\.springframework\.beans)" \
              target/surefire-reports/*.txt | head -n 250 || true
          fi

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          retention-days: 7

  frontend:
    name: Frontend verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ACCOUNTSHIELD_DATA_SOURCE: fixtures
      NEXT_PUBLIC_APP_ENV: ci

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install declared npm version
        run: npm install --global npm@11.4.2 --no-audit --no-fund

      - name: Generate reviewed lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate lockfile metadata
        run: |
          node -e 'const lock = require("./package-lock.json"); if (lock.lockfileVersion !== 3) throw new Error("Expected lockfileVersion 3"); if (lock.packages?.[""]?.name !== "accountshield-console") throw new Error("Unexpected root package");'

      - name: Commit generated lockfile
        if: github.event_name == 'push' && github.ref_name == 'feat/issue-63-frontend-lockfile'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "Lockfile already matches the dependency manifest."
            exit 0
          fi
          git commit -m "build(frontend): add reproducible npm lockfile"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Install dependencies from lockfile
        run: npm ci --no-audit --no-fund

      - name: Generate Next.js types
        run: npm run typegen

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [verify, frontend]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
